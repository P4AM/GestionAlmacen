<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="client-list" id="client-list" class="flex flex-col gap-6">
        
        <div th:if="${clientes.empty}" class="text-center py-16 bg-white/5 rounded-3xl border border-white/5 border-dashed">
            <svg class="mx-auto h-12 w-12 text-slate-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 005.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <h3 class="text-sm font-medium text-white">No hay clientes</h3>
            <p class="mt-1 text-sm text-slate-500">Aún no has registrado ningún cliente en el sistema.</p>
        </div>

        <!-- Contenedor con Scroll -->
        <div th:unless="${clientes.empty}" class="overflow-y-auto custom-scrollbar max-h-[75vh] pr-2">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div th:each="c : ${clientes}" 
                     class="glass-panel p-6 hover:bg-white/5 transition-all group relative border-l-4 border-l-transparent hover:border-l-blue-500">
                    
                    <div class="flex justify-between items-start mb-5">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400 font-bold text-xl" 
                                 th:text="${#strings.substring(c.nombre, 0, 1)}">
                                C
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-base leading-tight" th:text="${c.nombre}">Nombre del Cliente</h4>
                                <p class="text-[10px] text-slate-500 font-mono tracking-widest mt-1 uppercase" th:text="${c.documentoIdentidad}">ID DOCUMENT</p>
                            </div>
                        </div>
                        
                        <div class="flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                            <!-- Botón Editar -->
                            <button th:hx-get="'/clientes/edit/' + ${c.id}"
                                    hx-target="#add-client-form"
                                    hx-swap="outerHTML"
                                    class="p-2 bg-white/5 text-slate-400 rounded-xl hover:bg-blue-500 hover:text-white transition-all shadow-lg"
                                    title="Editar Cliente">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <!-- Botón Eliminar -->
                            <button th:hx-delete="'/clientes/delete/' + ${c.id}"
                                    hx-confirm="¿Estás seguro de eliminar este cliente?"
                                    hx-target="#client-list"
                                    class="p-2 bg-white/5 text-slate-400 rounded-xl hover:bg-red-500 hover:text-white transition-all shadow-lg"
                                    title="Eliminar Cliente">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-5">
                        <div class="flex items-center gap-3">
                            <div class="p-1.5 bg-slate-950 rounded-lg text-slate-600">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                            <span class="text-xs text-slate-400 truncate" th:text="${c.email}">email@test.com</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="p-1.5 bg-slate-950 rounded-lg text-slate-600">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            </div>
                            <span class="text-xs text-slate-400" th:text="${c.telefono}">999 999 999</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- OOB Update for dashboard stats -->
        <div id="stat-total" hx-swap-oob="true" class="text-2xl font-bold" th:text="${totalClientes}"></div>
    </div>
</body>
</html>
