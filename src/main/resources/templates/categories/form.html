<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <body>
    <form
      th:fragment="category-form"
      th:object="${categoria}"
      id="category-form"
      hx-swap-oob="true"
      hx-post="/categorias/add"
      hx-target="#category-list-container"
      hx-swap="outerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="space-y-6"
      x-data="{ show: false }"
      x-init="setTimeout(() => show = true, 50)"
    >
      <input type="hidden" th:field="*{id}" />

      <div
        x-show="show"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0"
      >
        <div
          th:replace="~{components :: erp_input('Nombre de Categoría', 'nombre', 'Ej. Electrónicos', 'text')}"
        ></div>
      </div>

      <div
        class="pt-4 space-y-3"
        x-show="show"
        x-transition:enter="transition ease-out duration-300 delay-100"
        x-transition:enter-start="opacity-0 translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0"
      >
        <button
          type="submit"
          class="w-full text-white bg-blue-600 hover:bg-blue-700 font-black rounded-2xl text-sm px-5 py-4 text-center transition-all shadow-lg active:scale-95 uppercase tracking-widest"
        >
          <span
            th:text="${categoria.id != null ? 'Actualizar Categoría' : 'Guardar Categoría'}"
            >Guardar Categoría</span
          >
        </button>

        <button
          type="button"
          th:if="${categoria.id != null}"
          hx-get="/categorias/form"
          hx-target="#category-form"
          hx-swap="outerHTML"
          class="w-full bg-white/5 hover:bg-white/10 text-slate-400 font-bold py-3 px-4 rounded-xl transition-all"
        >
          Cancelar Edición
        </button>
      </div>
    </form>
  </body>
</html>
