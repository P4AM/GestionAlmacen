<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Gestión de Categorías | ERP Premium</title>
  </head>
  <body>
    <main th:fragment="main" class="p-4 sm:p-8 space-y-10">
      <!-- Header con animación -->
      <header
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6"
        x-data="{ show: false }"
        x-init="setTimeout(() => show = true, 100)"
      >
        <div
          x-show="show"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 -translate-x-10"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <h1 class="text-4xl font-black text-white tracking-tighter">
            Categorías
          </h1>
          <p class="text-slate-400 font-medium">
            Clasificación de productos del inventario
          </p>
        </div>

        <div
          class="flex items-center gap-3 bg-slate-900/50 p-2 rounded-2xl border border-white/5"
          x-show="show"
          x-transition:enter="transition ease-out duration-500 delay-200"
          x-transition:enter-start="opacity-0 translate-x-10"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <div class="px-6 py-3">
            <span
              class="block text-[10px] font-black text-slate-500 uppercase tracking-widest"
              >Total Categorías</span
            >
            <span
              id="total-categories-count"
              class="text-2xl font-black text-blue-400"
              th:text="${totalCategorias}"
              >0</span
            >
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <!-- Columna Izquierda: Formulario -->
        <aside class="lg:col-span-4 space-y-6">
          <div
            th:replace="~{components :: erp_card('Nueva Categoría', 'Añade una categoría para organizar tus productos', ~{::category_form_content})}"
          >
            <div th:fragment="category_form_content">
              <div th:replace="~{categories/form :: category-form}"></div>
            </div>
          </div>
        </aside>

        <!-- Columna Derecha: Listado -->
        <section class="lg:col-span-8 space-y-6">
          <div
            th:replace="~{components :: erp_card('Listado de Categorías', 'Gestión y edición', ~{::category_list_content})}"
          >
            <div th:fragment="category_list_content">
              <div
                id="category-list-container"
                th:replace="~{categories/list :: category-list}"
              ></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
