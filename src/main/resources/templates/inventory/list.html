<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="product-list"
      class="glass-panel overflow-hidden flex flex-col transition-opacity duration-300 [&.htmx-request]:opacity-50"
      id="product-list-container"
      x-data="{ 
        sortCol: 'nombre', 
        sortDir: 'asc',
        sort(col) {
          if (this.sortCol === col) {
            this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            this.sortCol = col;
            this.sortDir = 'asc';
          }
          const tbody = this.$refs.tbody;
          const rows = Array.from(tbody.querySelectorAll('tr[data-nombre]'));
          
          rows.sort((a, b) => {
            let valA = a.dataset[this.sortCol];
            let valB = b.dataset[this.sortCol];
            
            if (this.sortCol === 'stock') {
              valA = parseInt(valA) || 0;
              valB = parseInt(valB) || 0;
            } else {
              valA = valA.toLowerCase();
              valB = valB.toLowerCase();
            }
            
            if (valA < valB) return this.sortDir === 'asc' ? -1 : 1;
            if (valA > valB) return this.sortDir === 'asc' ? 1 : -1;
            return 0;
          });
          
          rows.forEach(row => tbody.appendChild(row));
        }
      }"
    >
      <!-- Actualizar contadores del Header (OOB) -->
      <span
        id="stat-total"
        hx-swap-oob="true"
        th:text="${#lists.size(productos)}"
        class="hidden"
        >0</span
      >
      <span
        id="stat-bajo"
        hx-swap-oob="true"
        th:text="${productos.?[stock < 10].size()}"
        class="hidden"
        >0</span
      >

      <div
        class="overflow-x-auto overflow-y-auto custom-scrollbar max-h-[70vh]"
      >
        <table
          class="w-full text-sm text-left rtl:text-right text-slate-400 sticky-header"
        >
          <thead
            class="text-xs text-slate-500 uppercase bg-slate-900/90 backdrop-blur-sm sticky top-0 z-10"
          >
            <tr class="cursor-pointer">
              <th scope="col" class="px-6 py-4 font-semibold">Imagen</th>
              <th
                scope="col"
                class="px-6 py-4 font-semibold hover:text-blue-400 transition-colors cursor-pointer"
                @click="sort('nombre')"
              >
                <div class="flex items-center gap-1">
                  Producto
                  <svg
                    class="w-3 h-3 transition-transform"
                    :class="sortCol === 'nombre' && sortDir === 'desc' ? 'rotate-180' : ''"
                    :style="sortCol === 'nombre' ? 'color: #3b82f6' : ''"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M5 15l7-7 7 7"
                      stroke-width="3"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </svg>
                </div>
              </th>
              <th
                scope="col"
                class="px-6 py-4 font-semibold hover:text-blue-400 transition-colors cursor-pointer"
                @click="sort('categoria')"
              >
                <div class="flex items-center gap-1">
                  Categoría
                  <svg
                    class="w-3 h-3 transition-transform"
                    :class="sortCol === 'categoria' && sortDir === 'desc' ? 'rotate-180' : ''"
                    :style="sortCol === 'categoria' ? 'color: #3b82f6' : ''"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M5 15l7-7 7 7"
                      stroke-width="3"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </svg>
                </div>
              </th>
              <th
                scope="col"
                class="px-6 py-4 font-semibold text-center hover:text-blue-400 transition-colors cursor-pointer"
                @click="sort('stock')"
              >
                <div class="flex items-center justify-center gap-1">
                  Stock
                  <svg
                    class="w-3 h-3 transition-transform"
                    :class="sortCol === 'stock' && sortDir === 'desc' ? 'rotate-180' : ''"
                    :style="sortCol === 'stock' ? 'color: #3b82f6' : ''"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M5 15l7-7 7 7"
                      stroke-width="3"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </svg>
                </div>
              </th>
              <th scope="col" class="px-6 py-4 font-semibold text-right">
                Acciones
              </th>
            </tr>
          </thead>
          <tbody class="divide-y divide-white/5" x-ref="tbody">
            <tr
              th:each="p : ${productos}"
              class="hover:bg-white/5 transition-colors group"
              th:attr="data-nombre=${p.nombre}, data-categoria=${p.categoria.nombre}, data-stock=${p.stock}"
            >
              <td class="px-6 py-5">
                <div
                  class="w-12 h-12 rounded-xl bg-slate-900 border border-white/5 overflow-hidden"
                >
                  <img
                    th:if="${p.imagenUrl != null}"
                    th:src="${p.imagenUrl}"
                    class="w-full h-full object-cover transition-transform group-hover:scale-110"
                  />
                  <div
                    th:if="${p.imagenUrl == null}"
                    class="w-full h-full flex items-center justify-center text-slate-800"
                  >
                    <svg
                      class="w-6 h-6"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                      ></path>
                    </svg>
                  </div>
                </div>
              </td>
              <td class="px-6 py-5">
                <div class="font-semibold text-slate-200" th:text="${p.nombre}">
                  Laptops
                </div>
                <div class="flex items-center gap-2 mt-1">
                  <div
                    class="text-[10px] text-slate-500 font-mono"
                    th:text="'SKU-' + ${p.id}"
                  >
                    #1
                  </div>
                  <div class="text-[10px] text-slate-600">|</div>
                  <div
                    class="text-[10px] text-slate-500"
                    th:text="${p.proveedor?.nombre}"
                  >
                    Proveedor
                  </div>
                </div>
              </td>
              <td class="px-6 py-5">
                <span
                  class="px-2 py-0.5 rounded-md text-[10px] font-bold bg-slate-800 text-slate-400 border border-white/5 uppercase"
                  th:text="${p.categoria.nombre}"
                  >Electrónica</span
                >
              </td>
              <td class="px-6 py-5 text-center">
                <div class="flex flex-col items-center gap-1">
                  <div class="flex items-center gap-2">
                    <span
                      class="text-lg font-black"
                      th:classappend="${p.stock < 10 ? 'text-red-400 animate-pulse' : 'text-white'}"
                      th:text="${p.stock}"
                      >25</span
                    >
                    <!-- Botón Entrada Rápida (FIX: Usar data-attributes para evitar SyntaxError) -->
                    <button
                      th:data-id="${p.id}"
                      th:data-nombre="${p.nombre}"
                      @click="$dispatch('open-stock-modal', { id: $el.dataset.id, nombre: $el.dataset.nombre })"
                      class="p-1 bg-blue-500/10 text-blue-400 rounded-md hover:bg-blue-500 hover:text-white transition-all opacity-0 group-hover:opacity-100"
                      title="Registrar Entrada"
                    >
                      <svg
                        class="w-3 h-3"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="3"
                          d="M12 4v16m8-8H4"
                        ></path>
                      </svg>
                    </button>
                  </div>
                  <div
                    th:if="${p.stock < 10}"
                    class="text-[9px] text-red-500/80 font-bold uppercase tracking-tighter"
                  >
                    Bajo Stock
                  </div>
                </div>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="flex gap-2 justify-end">
                  <!-- Botón Editar -->
                  <button
                    th:hx-get="'/inventario/edit/' + ${p.id}"
                    hx-target="#product-form"
                    hx-swap="outerHTML"
                    class="text-slate-500 hover:text-blue-400 transition-all p-2 rounded-xl hover:bg-blue-500/10"
                    title="Editar"
                  >
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                      ></path>
                    </svg>
                  </button>
                  <!-- Botón Eliminar -->
                  <button
                    th:hx-delete="'/inventario/delete/' + ${p.id}"
                    hx-target="#product-list-container"
                    hx-swap="outerHTML"
                    hx-confirm="¿Estás seguro de eliminar este producto?"
                    class="text-slate-500 hover:text-red-400 transition-all p-2 rounded-xl hover:bg-red-500/10"
                    title="Eliminar"
                  >
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                      ></path>
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(productos)}">
              <td colspan="5" class="px-6 py-20 text-center">
                <div class="flex flex-col items-center gap-3 text-slate-500">
                  <svg
                    class="w-12 h-12 opacity-20"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"
                    ></path>
                  </svg>
                  <p class="text-sm">
                    No hay productos registrados en el sistema.
                  </p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
