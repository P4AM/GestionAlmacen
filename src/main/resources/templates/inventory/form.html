<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <body>
    <form
      th:fragment="product-form"
      th:object="${producto}"
      id="product-form"
      hx-swap-oob="true"
      hx-post="/inventario/add"
      hx-target="#product-list-container"
      hx-swap="outerHTML"
      hx-trigger="submit-confirmed"
      hx-on::after-request="if(event.detail.successful) { this.reset(); $dispatch('clear-form'); }"
      class="space-y-6"
      x-data="productUploadHandler()"
      th:attr="data-id=${producto.id}, data-img=${producto.imagenUrl}, data-label=${producto.id != null ? 'ACTUALIZAR PRODUCTO' : 'GUARDAR PRODUCTO'}"
      @submit.prevent="saveProduct()"
      @clear-form.window="clear()"
      x-init="init()"
    >
      <!-- ID para edición -->
      <input type="hidden" th:field="*{id}" />

      <!-- URL Final -->
      <input
        type="hidden"
        th:field="*{imagenUrl}"
        x-model="imagenUrl"
        x-ref="imgUrlInput"
      />

      <div
        x-show="show"
        x-transition:enter="transition ease-out duration-300"
        x-cloak
      >
        <div
          th:replace="~{components :: erp_input('Nombre del Producto', 'nombre', 'Ej. Laptop Gamer Pro', 'text')}"
        ></div>
      </div>

      <div
        x-show="show"
        x-transition:enter="transition ease-out duration-300 delay-75"
        x-cloak
      >
        <label
          class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2"
          >Descripción</label
        >
        <textarea
          th:field="*{descripcion}"
          rows="3"
          placeholder="Detalles técnicos, garantía..."
          class="w-full bg-slate-950 border border-white/10 rounded-2xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-700"
        ></textarea>
      </div>

      <!-- Uploader -->
      <div
        x-show="show"
        x-transition:enter="transition ease-out duration-300 delay-100"
        class="space-y-2"
        x-cloak
      >
        <label
          class="block text-[10px] font-black text-slate-500 uppercase tracking-widest"
          >Foto del Producto</label
        >
        <div class="relative group">
          <div class="flex items-center justify-center w-full">
            <label
              class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed rounded-3xl cursor-pointer bg-slate-950 border-white/10 hover:border-blue-500/50 hover:bg-blue-500/5 transition-all relative overflow-hidden"
            >
              <template x-if="preview">
                <img
                  :src="preview"
                  class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-70 transition-opacity"
                />
              </template>

              <div
                class="flex flex-col items-center justify-center pt-5 pb-6 z-10"
                x-show="!optimizing"
              >
                <svg
                  class="w-10 h-10 mb-3 text-slate-500 group-hover:text-blue-400 transition-colors"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                  ></path>
                </svg>
                <p class="text-xs text-slate-400 font-bold">
                  <span class="text-blue-400">Elegir Imagen</span>
                </p>
                <p
                  class="text-[9px] text-slate-600 mt-2 uppercase tracking-widest font-black"
                  x-text="statusMsg"
                ></p>
              </div>

              <div
                x-show="optimizing"
                class="flex flex-col items-center justify-center z-10"
              >
                <div
                  class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mb-3"
                ></div>
                <p
                  class="text-[10px] font-black text-blue-400 animate-pulse uppercase tracking-widest"
                >
                  Optimizando...
                </p>
              </div>

              <input
                type="file"
                class="hidden"
                accept="image/*"
                @change="handleFileSelection($event)"
              />
            </label>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div
          th:replace="~{components :: erp_input('Precio', 'precio', '0.00', 'number')}"
        ></div>
        <div
          th:replace="~{components :: erp_input('Stock', 'stock', '0', 'number')}"
        ></div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div
          th:replace="~{components :: erp_select('Categoría', 'categoria.id', ${categorias}, 'id', 'nombre')}"
        ></div>
        <div
          th:replace="~{components :: erp_select('Proveedor', 'proveedor.id', ${proveedores}, 'id', 'nombre')}"
        ></div>
      </div>

      <button
        type="submit"
        :disabled="optimizing || uploading"
        class="w-full text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 font-black rounded-2xl text-base px-5 py-5 transition-all shadow-xl shadow-blue-600/20 active:scale-[0.97] tracking-widest group flex items-center justify-center gap-3 uppercase"
      >
        <span
          x-show="uploading"
          class="animate-spin h-5 w-5 border-2 border-white/30 border-t-white rounded-full"
        ></span>

        <span class="htmx-indicator hidden group-[.htmx-request]:inline-block">
          <svg
            class="animate-spin h-5 w-5 text-white"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        </span>

        <span x-text="btnLabel"></span>
      </button>

      <!-- Scripts -->
      <script src="https://unpkg.com/pica/dist/pica.min.js"></script>
      <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

      <script>
        // Singleton para Supabase
        if (!window.supabaseClient) {
          const SUPABASE_URL = "https://nwhcwwdfhfubnnvwhckl.supabase.co";
          const SUPABASE_KEY = "sb_publishable_xyb1ORWCw9P0mqJKVJqZrw_yWiIBJ2x";
          window.supabaseClient = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY,
          );
        }

        function productUploadHandler() {
          return {
            show: false,
            optimizing: false,
            uploading: false,
            preview: "",
            imagenUrl: "",
            pendingBlob: null,
            statusMsg: "Pica.js activo",
            defaultLabel: "",

            init() {
              const initialImg = this.$el.dataset.img || "";
              // Limpieza: Si por algún error anterior se guardó un blob:, lo ignoramos
              this.preview = initialImg.startsWith("blob:") ? "" : initialImg;
              this.imagenUrl = initialImg.startsWith("blob:") ? "" : initialImg;
              this.defaultLabel = this.$el.dataset.label || "GUARDAR PRODUCTO";
              setTimeout(() => (this.show = true), 50);
            },

            get btnLabel() {
              if (this.uploading) return "SUBIENDO IMAGEN...";
              if (this.optimizing) return "OPTIMIZANDO...";
              return this.defaultLabel;
            },

            async handleFileSelection(event) {
              const file = event.target.files[0];
              if (!file) return;
              this.optimizing = true;
              try {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise((resolve) => (img.onload = resolve));
                const canvas = document.createElement("canvas");
                const MAX_WIDTH = 800;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const pica = window.pica();
                const resizedCanvas = await pica.resize(img, canvas);
                const blob = await pica.toBlob(
                  resizedCanvas,
                  "image/jpeg",
                  0.85,
                );
                this.pendingBlob = blob;
                this.preview = URL.createObjectURL(blob);
                this.imagenUrl = ""; // Limpiamos la URL vieja porque hay una nueva pendiente
                this.statusMsg = "Imagen lista para subir";
              } catch (e) {
                console.error(e);
                this.statusMsg = "Error al procesar";
              } finally {
                this.optimizing = false;
              }
            },

            async saveProduct() {
              if (this.optimizing || this.uploading) return;
              if (this.pendingBlob) {
                this.uploading = true;
                try {
                  const fileName = `product_${Date.now()}.jpg`;
                  const { data, error } = await window.supabaseClient.storage
                    .from("productos")
                    .upload(fileName, this.pendingBlob, {
                      contentType: "image/jpeg",
                    });
                  if (error) throw error;
                  const {
                    data: { publicUrl },
                  } = window.supabaseClient.storage
                    .from("productos")
                    .getPublicUrl(fileName);
                  this.imagenUrl = publicUrl;
                  // Forzamos el valor en el DOM para que HTMX lo capture
                  this.$refs.imgUrlInput.value = publicUrl;
                } catch (e) {
                  alert("Error al subir imagen");
                  this.uploading = false;
                  return;
                } finally {
                  this.uploading = false;
                }
              }

              if (this.imagenUrl.startsWith("blob:")) {
                alert(
                  "Error crítico: La imagen no se ha subido a la nube aún.",
                );
                return;
              }

              htmx.trigger(this.$el, "submit-confirmed");
            },

            clear() {
              this.preview = "";
              this.imagenUrl = "";
              this.pendingBlob = null;
              this.statusMsg = "Pica.js activo";
            },
          };
        }
      </script>
    </form>
  </body>
</html>
