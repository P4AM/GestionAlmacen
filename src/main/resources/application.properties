spring.application.name=final

# Configuración de Servidor y Túneles
server.port=8080
server.forward-headers-strategy=framework
server.error.include-message=always

# Database Configuration (Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.nwhcwwdfhfubnnvwhckl.supabase.co:5432/postgres?user=postgres&password=mangopelado123&reWriteBatchedInserts=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.nwhcwwdfhfubnnvwhckl}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mangopelado123}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Pool Configuration (Optimized for Async Tasks)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate Batching
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Cache Configuration
spring.cache.type=caffeine

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.temporal.almacen=INFO
