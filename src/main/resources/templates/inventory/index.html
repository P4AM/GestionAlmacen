<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="main"
      class="space-y-10"
      x-data="{ stockModalOpen: false, productId: null, productName: '' }"
    >
      <header
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-white/5 pb-8"
        x-data="{ show: false }"
        x-init="setTimeout(() => show = true, 50)"
      >
        <div
          x-show="show"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 -translate-x-10"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <h2 class="text-4xl font-black text-white tracking-tighter">
            Inventario
          </h2>
          <p class="text-slate-400 font-medium">
            Gestión de existencias en tiempo real
          </p>
        </div>

        <div
          class="flex items-center gap-3"
          x-show="show"
          x-transition:enter="transition ease-out duration-500 delay-200"
          x-transition:enter-start="opacity-0 translate-x-10"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <div
            class="bg-slate-900/50 border border-white/5 rounded-2xl px-5 py-3 flex flex-col items-end"
          >
            <span
              class="text-[10px] font-black text-slate-500 uppercase tracking-widest"
              >Total</span
            >
            <span
              id="stat-total"
              class="text-xl font-black text-blue-400"
              th:text="${totalProductos}"
              >0</span
            >
          </div>
          <div
            class="bg-red-500/10 border border-red-500/20 rounded-2xl px-5 py-3 flex flex-col items-end"
          >
            <span
              class="text-[10px] font-black text-red-500 uppercase tracking-widest"
              >Stock Bajo</span
            >
            <span
              id="stat-bajo"
              class="text-xl font-black text-red-400"
              th:text="${stockBajo}"
              >0</span
            >
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <!-- Formulario (Columna Lateral) -->
        <aside class="lg:col-span-1 space-y-6">
          <div class="glass-panel p-8">
            <h3
              class="text-xl font-bold mb-6"
              th:text="${producto.id != null ? 'Editar Producto' : 'Nuevo Producto'}"
            >
              Nuevo Producto
            </h3>
            <div th:replace="~{inventory/form :: product-form}"></div>
          </div>
        </aside>

        <!-- Lista de Productos (Columna Principal) -->
        <section class="lg:col-span-2 space-y-6">
          <div class="flex items-center gap-4">
            <div
              class="flex-1 flex items-center gap-4 bg-white/5 p-2 rounded-2xl border border-white/5"
            >
              <input
                type="text"
                name="q"
                placeholder="Buscar productos por nombre..."
                class="w-full bg-transparent border-none focus:ring-0 px-4 py-2"
                hx-get="/inventario/search"
                hx-target="#product-list-container"
                hx-swap="outerHTML"
                hx-trigger="keyup changed delay:300ms"
              />
              <div class="px-4 text-slate-500">
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                  ></path>
                </svg>
              </div>
            </div>
            <a
              href="/reportes/excel/inventario"
              class="flex items-center gap-2 bg-green-600/20 text-green-400 hover:bg-green-600 hover:text-white border border-green-600/30 px-5 py-3 rounded-2xl transition-all font-black text-[10px] uppercase tracking-widest whitespace-nowrap"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                ></path>
              </svg>
              Excel
            </a>
          </div>

          <div
            id="product-list-container"
            hx-get="/inventario/search"
            hx-trigger="load"
            hx-swap="outerHTML"
          >
            <div class="flex justify-center p-12">
              <div
                class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"
              ></div>
            </div>
          </div>
        </section>
      </div>

      <!-- MODAL DE ENTRADA DE STOCK -->
      <div
        x-show="stockModalOpen"
        @open-stock-modal.window="stockModalOpen = true; productId = $event.detail.id; productName = $event.detail.nombre"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        x-cloak
      >
        <div
          class="glass-panel w-full max-w-md p-8 relative"
          @click.away="stockModalOpen = false"
        >
          <h3 class="text-2xl font-bold mb-2">Registrar Entrada</h3>
          <p class="text-slate-400 text-sm mb-6">
            Aumentar stock para:
            <span class="text-blue-400 font-bold" x-text="productName"></span>
          </p>

          <form
            hx-post="/inventario/stock-entry"
            hx-target="#product-list-container"
            hx-swap="outerHTML"
            @submit="stockModalOpen = false"
          >
            <input type="hidden" name="id" :value="productId" />

            <div class="space-y-4">
              <div class="relative">
                <input
                  type="number"
                  name="cantidad"
                  required
                  min="1"
                  placeholder=" "
                  class="peer w-full bg-slate-950 border border-white/10 rounded-xl px-4 pt-6 pb-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                />
                <label
                  class="absolute text-slate-400 font-bold uppercase tracking-wider left-4 top-4 transition-all duration-200 pointer-events-none peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-focus:top-1.5 peer-focus:text-[10px] peer-focus:text-blue-500 peer-valid:top-1.5 peer-valid:text-[10px]"
                >
                  Cantidad a Ingresar
                </label>
              </div>
            </div>

            <div class="flex gap-3 mt-8">
              <button
                type="button"
                @click="stockModalOpen = false"
                class="flex-1 bg-white/5 hover:bg-white/10 text-slate-400 font-bold py-3 rounded-xl transition-all"
              >
                Cancelar
              </button>
              <button
                type="submit"
                class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20 group flex items-center justify-center gap-2"
              >
                <span
                  class="htmx-indicator hidden group-[.htmx-request]:inline-block"
                >
                  <svg
                    class="animate-spin h-4 w-4 text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <circle
                      class="opacity-25"
                      cx="12"
                      cy="12"
                      r="10"
                      stroke="currentColor"
                      stroke-width="4"
                    ></circle>
                    <path
                      class="opacity-75"
                      fill="currentColor"
                      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                    ></path>
                  </svg>
                </span>
                Confirmar Entrada
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
