<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="provider-list" id="provider-list">
        
        <div th:if="${proveedores.empty}" class="text-center py-16 bg-white/5 rounded-3xl border border-white/5 border-dashed">
            <svg class="mx-auto h-12 w-12 text-slate-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            <h3 class="text-sm font-medium text-white">No hay proveedores</h3>
            <p class="mt-1 text-sm text-slate-500">Aún no has registrado ningún proveedor en el sistema.</p>
        </div>

        <div th:unless="${proveedores.empty}" class="bg-slate-900 border border-white/5 rounded-3xl overflow-hidden flex flex-col">
            <div class="overflow-y-auto custom-scrollbar max-h-[70vh]">
                <table class="min-w-full divide-y divide-white/5">
                    <thead class="bg-slate-950/50 sticky top-0 z-10 backdrop-blur-md">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Empresa</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">RUC / ID</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Contacto</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-slate-400 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5 bg-transparent">
                        <tr th:each="p : ${proveedores}" class="hover:bg-white/5 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="font-bold text-white" th:text="${p.nombre}"></div>
                                <div class="text-[10px] text-slate-500 truncate max-w-[200px]" th:text="${p.direccion}"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-0.5 rounded-md text-[10px] font-bold bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase" th:text="${p.ruc}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-slate-300" th:text="${p.email}"></div>
                                <div class="text-xs text-slate-500" th:text="${p.telefono}"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium flex gap-2 justify-end">
                                <button th:hx-get="@{/proveedores/edit/{id}(id=${p.id})}"
                                        hx-target="#add-provider-form"
                                        hx-swap="outerHTML"
                                        class="text-blue-400 hover:text-blue-300 transition-colors bg-blue-500/10 p-2 rounded-lg inline-block">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                </button>
                                <button th:hx-delete="@{/proveedores/delete/{id}(id=${p.id})}"
                                        hx-confirm="¿Estás seguro de eliminar este proveedor? Esto podría afectar a los productos asociados."
                                        hx-target="#provider-list"
                                        class="text-red-400 hover:text-red-300 transition-colors bg-red-500/10 p-2 rounded-lg inline-block">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- OOB Update for stats -->
        <div id="stat-total" hx-swap-oob="true" class="text-2xl font-bold" th:text="${totalProveedores}"></div>
    </div>
</body>
</html>
