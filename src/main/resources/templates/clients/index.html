<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="main" class="space-y-10">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-900 border border-white/5 rounded-3xl p-6 flex items-center gap-5">
                <div class="p-3 bg-blue-500/10 rounded-2xl text-blue-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-slate-400">Total Clientes</p>
                    <h4 id="stat-total" class="text-2xl font-bold" th:text="${totalClientes}">0</h4>
                </div>
            </div>
        </div>

        <header class="border-b border-white/5 pb-6">
            <h2 class="text-3xl font-bold">Directorio de Clientes</h2>
            <p class="text-slate-400 mt-1">Gestión de cartera de clientes e información de contacto.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Formulario (Columna Lateral) -->
            <aside class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-white/5 rounded-3xl p-8">
                    <h3 class="text-xl font-bold mb-6">Nuevo Cliente</h3>
                    <div th:replace="~{clients/form :: client-form}"></div>
                </div>
            </aside>

            <!-- Lista de Clientes (Columna Principal) -->
            <section class="lg:col-span-2 space-y-6">
                <div class="flex items-center gap-4 bg-white/5 p-2 rounded-2xl border border-white/5">
                    <input type="text" 
                           name="q" 
                           placeholder="Buscar por nombre o documento..." 
                           class="w-full bg-transparent border-none focus:ring-0 px-4 py-2 text-white"
                           hx-get="/clientes/search"
                           hx-target="#client-list"
                           hx-trigger="keyup changed delay:300ms">
                    <div class="px-4 text-slate-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>

                <div id="client-list" hx-get="/clientes/search" hx-trigger="load">
                    <!-- Cargado por HTMX -->
                    <div class="flex justify-center p-12">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
