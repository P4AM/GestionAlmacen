<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <form th:fragment="client-form"
          id="add-client-form"
          th:object="${cliente}"
          hx-post="/clientes/add"
          hx-target="#client-list"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          class="space-y-6"
          x-data="{ show: false }"
          x-init="setTimeout(() => show = true, 50)">
        
        <!-- ID oculto para edición -->
        <input type="hidden" th:field="*{id}">

        <div class="relative"
             x-show="show" x-transition:enter="transition ease-out duration-300 delay-75" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak>
            <input type="text" id="nombreCliente" th:field="*{nombre}" required placeholder=" "
                   class="peer w-full bg-slate-950 border border-white/10 rounded-xl px-4 pt-6 pb-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none shadow-inner shadow-black/50 hover:bg-slate-900 focus:bg-slate-950 focus:shadow-blue-500/20">
            <label for="nombreCliente" 
                   class="absolute text-slate-400 font-bold uppercase tracking-wider left-4 top-4 transition-all duration-200 pointer-events-none 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case 
                          peer-focus:top-1.5 peer-focus:text-[10px] peer-focus:text-blue-500 peer-focus:uppercase 
                          peer-valid:top-1.5 peer-valid:text-[10px] peer-valid:uppercase
                          [input:not(:placeholder-shown)~&]:top-1.5 [input:not(:placeholder-shown)~&]:text-[10px] [input:not(:placeholder-shown)~&]:uppercase">
                Nombre Completo
            </label>
        </div>
        
        <div class="relative"
             x-show="show" x-transition:enter="transition ease-out duration-300 delay-100" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak>
            <input type="text" id="documentoIdentidad" th:field="*{documentoIdentidad}" required placeholder=" "
                   class="peer w-full bg-slate-950 border border-white/10 rounded-xl px-4 pt-6 pb-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none shadow-inner shadow-black/50 hover:bg-slate-900 focus:bg-slate-950 focus:shadow-blue-500/20">
            <label for="documentoIdentidad" 
                   class="absolute text-slate-400 font-bold uppercase tracking-wider left-4 top-4 transition-all duration-200 pointer-events-none 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case 
                          peer-focus:top-1.5 peer-focus:text-[10px] peer-focus:text-blue-500 peer-focus:uppercase 
                          peer-valid:top-1.5 peer-valid:text-[10px] peer-valid:uppercase
                          [input:not(:placeholder-shown)~&]:top-1.5 [input:not(:placeholder-shown)~&]:text-[10px] [input:not(:placeholder-shown)~&]:uppercase">
                Documento de Identidad
            </label>
        </div>

        <div class="relative"
             x-show="show" x-transition:enter="transition ease-out duration-300 delay-150" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak>
            <input type="email" id="emailCliente" th:field="*{email}" placeholder=" "
                   class="peer w-full bg-slate-950 border border-white/10 rounded-xl px-4 pt-6 pb-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none shadow-inner shadow-black/50 hover:bg-slate-900 focus:bg-slate-950 focus:shadow-blue-500/20">
            <label for="emailCliente" 
                   class="absolute text-slate-400 font-bold uppercase tracking-wider left-4 top-4 transition-all duration-200 pointer-events-none 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case 
                          peer-focus:top-1.5 peer-focus:text-[10px] peer-focus:text-blue-500 peer-focus:uppercase 
                          peer-valid:top-1.5 peer-valid:text-[10px] peer-valid:uppercase
                          [input:not(:placeholder-shown)~&]:top-1.5 [input:not(:placeholder-shown)~&]:text-[10px] [input:not(:placeholder-shown)~&]:uppercase">
                Email
            </label>
        </div>

        <div class="relative"
             x-show="show" x-transition:enter="transition ease-out duration-300 delay-200" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak>
            <input type="text" id="telefonoCliente" th:field="*{telefono}" placeholder=" "
                   class="peer w-full bg-slate-950 border border-white/10 rounded-xl px-4 pt-6 pb-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none shadow-inner shadow-black/50 hover:bg-slate-900 focus:bg-slate-950 focus:shadow-blue-500/20">
            <label for="telefonoCliente" 
                   class="absolute text-slate-400 font-bold uppercase tracking-wider left-4 top-4 transition-all duration-200 pointer-events-none 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case 
                          peer-focus:top-1.5 peer-focus:text-[10px] peer-focus:text-blue-500 peer-focus:uppercase 
                          peer-valid:top-1.5 peer-valid:text-[10px] peer-valid:uppercase
                          [input:not(:placeholder-shown)~&]:top-1.5 [input:not(:placeholder-shown)~&]:text-[10px] [input:not(:placeholder-shown)~&]:uppercase">
                Teléfono
            </label>
        </div>

        <div class="relative"
             x-show="show" x-transition:enter="transition ease-out duration-300 delay-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak>
            <textarea id="direccionCliente" th:field="*{direccion}" rows="2" placeholder=" "
                   class="peer w-full bg-slate-950 border border-white/10 rounded-xl px-4 pt-6 pb-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none shadow-inner shadow-black/50 hover:bg-slate-900 focus:bg-slate-950 focus:shadow-blue-500/20"></textarea>
            <label for="direccionCliente" 
                   class="absolute text-slate-400 font-bold uppercase tracking-wider left-4 top-4 transition-all duration-200 pointer-events-none 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case 
                          peer-focus:top-1.5 peer-focus:text-[10px] peer-focus:text-blue-500 peer-focus:uppercase 
                          peer-valid:top-1.5 peer-valid:text-[10px] peer-valid:uppercase
                          [input:not(:placeholder-shown)~&]:top-1.5 [input:not(:placeholder-shown)~&]:text-[10px] [input:not(:placeholder-shown)~&]:uppercase">
                Dirección
            </label>
        </div>

        <button type="submit" 
                x-show="show" x-transition:enter="transition ease-out duration-300 delay-500" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98] group flex items-center justify-center gap-2">
            <span class="htmx-indicator hidden group-[.htmx-request]:inline-block">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </span>
            <span class="group-[.htmx-request]:opacity-50 transition-opacity" th:text="${cliente.id != null ? 'Actualizar Cliente' : 'Guardar Cliente'}">Guardar Cliente</span>
        </button>
        
        <!-- Botón Cancelar (solo en edición) -->
        <button type="button" th:if="${cliente.id != null}"
                hx-get="/clientes/form" hx-target="#add-client-form" hx-swap="outerHTML"
                class="w-full bg-white/5 hover:bg-white/10 text-slate-400 font-bold py-2 px-4 rounded-xl transition-all mt-2">
            Cancelar Edición
        </button>
    </form>
</body>
</html>
